<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funmax 链接转换工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 40px 20px; }
.container { max-width: 1200px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
h1 { font-size: 22px; margin-bottom: 24px; color: #333; text-align: center; }
.main { display: flex; gap: 24px; align-items: stretch; }
.panel { flex: 1; display: flex; flex-direction: column; }
.panel label { font-size: 14px; color: #666; margin-bottom: 8px; }
.panel textarea { flex: 1; min-height: 300px; border: 1px solid #ddd; border-radius: 8px; padding: 12px; font-size: 13px; font-family: monospace; resize: vertical; transition: border-color 0.2s; line-height: 1.6; }
.panel textarea:focus { outline: none; border-color: #4f46e5; }
#output { background: #f9fafb; }
.middle { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 12px; padding: 0 8px; }
button { padding: 10px 24px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
button:hover { background: #4338ca; }
button:active { background: #3730a3; }
.btn-copy { background: #10b981; }
.btn-copy:hover { background: #059669; }
.btn-json { background: #f59e0b; }
.btn-json:hover { background: #d97706; }
.msg { margin-top: 8px; font-size: 13px; color: #10b981; min-height: 20px; text-align: center; }
@media (max-width: 768px) {
  .main { flex-direction: column; }
  .middle { flex-direction: row; padding: 8px 0; }
  .panel textarea { min-height: 180px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>Funmax 链接转换工具</h1>
  <div class="main">
    <div class="panel">
      <label for="input">输入游戏链接（每行一个）</label>
      <textarea id="input" placeholder="https://afantai-browser02.aaxxgames.com/detail/game-detail.html?gid=...&#10;https://another-link...&#10;..."></textarea>
    </div>
    <div class="middle">
      <button onclick="convert()">转换 →</button>
      <button class="btn-copy" onclick="copyResult()">复制结果</button>
      <button class="btn-json" onclick="copyJson()">复制 JSON</button>
      <div class="msg" id="msg"></div>
    </div>
    <div class="panel">
      <label for="output">输出 Funmax Deep Link（每行一个）</label>
      <textarea id="output" readonly></textarea>
    </div>
  </div>
</div>
<script>
function convertOne(url) {
  try {
    const params = new URL(url).searchParams;
    const gameId = params.get('gid') || '';
    const encoded = encodeURIComponent(url);
    return `funmax://game.detail?miref=mediation&url=${encoded}&gameId=${gameId}`;
  } catch (e) {
    return `[无效链接] ${url}`;
  }
}

function convert() {
  const lines = document.getElementById('input').value.split('\n').map(l => l.trim()).filter(l => l);
  if (!lines.length) return;
  document.getElementById('output').value = lines.map(convertOne).join('\n');
}

function copyResult() {
  const output = document.getElementById('output');
  if (!output.value) return;
  navigator.clipboard.writeText(output.value).then(() => {
    showMsg('已复制');
  });
}

function copyJson() {
  const output = document.getElementById('output');
  if (!output.value) return;
  const lines = output.value.split('\n').filter(l => l && !l.startsWith('[无效链接]'));
  const json = JSON.stringify(lines, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    showMsg('已复制 JSON');
  });
}

function showMsg(text) {
  const msg = document.getElementById('msg');
  msg.textContent = text;
  setTimeout(() => msg.textContent = '', 2000);
}
</script>
</body>
</html>
